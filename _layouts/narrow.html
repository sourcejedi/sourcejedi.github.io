<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}
  {% comment %}
    Minima default layout, except we change the wrapper class.
  {% endcomment %}

  <body>

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper-narrow">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

  </body>

</html>
